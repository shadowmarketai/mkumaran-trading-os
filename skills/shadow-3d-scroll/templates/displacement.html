<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Image Displacement — Shadow 3D Scroll</title>
<style>
  :root { --bg: #1a1a1a; --fg: #f5efe0; }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); color: var(--fg); font-family: 'Inter', system-ui, sans-serif; }
  
  .intro {
    min-height: 80vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 5vw;
  }
  .intro h1 {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: clamp(2rem, 6vw, 6rem);
    font-weight: 400;
    line-height: 0.95;
    letter-spacing: -0.03em;
    max-width: 15ch;
    text-align: center;
  }
  
  .displace-wrap {
    position: relative;
    width: min(90vw, 900px);
    aspect-ratio: 16 / 10;
    margin: 10vh auto;
    cursor: pointer;
  }
  .displace-wrap canvas {
    width: 100%;
    height: 100%;
    display: block;
  }
  .displace-caption {
    position: absolute;
    bottom: -3rem;
    left: 0;
    font-size: 11px;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    opacity: 0.6;
  }
  
  .spacer {
    height: 60vh;
  }
</style>
</head>
<body>

<section class="intro">
  <h1>Hover the image. Then scroll. Feel the ripple.</h1>
</section>

<div class="displace-wrap" id="displace-1">
  <canvas></canvas>
  <div class="displace-caption">(V) The Fox Spirit — 1/4</div>
</div>

<div class="spacer"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.5/ScrollTrigger.min.js"></script>
<script src="https://unpkg.com/lenis@1.1.14/dist/lenis.min.js"></script>

<script type="importmap">
{ "imports": { "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js" } }
</script>

<script type="module">
import * as THREE from 'three';

gsap.registerPlugin(ScrollTrigger);

// Smooth scroll
const lenis = new Lenis({ duration: 1.2, smoothWheel: true, smoothTouch: false });
lenis.on('scroll', ScrollTrigger.update);
gsap.ticker.add((time) => lenis.raf(time * 1000));
gsap.ticker.lagSmoothing(0);

// ─────────────────────────────────────────────────
// Displacement effect builder
// ─────────────────────────────────────────────────
function createDisplacementImage({ wrap, imageUrl, displacementSeed = 0 }) {
  const canvas = wrap.querySelector('canvas');
  const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
  const scene = new THREE.Scene();
  const camera = new THREE.OrthographicCamera(-1, 1, 1, -1, 0.1, 10);
  camera.position.z = 1;

  const loader = new THREE.TextureLoader();
  const texture = loader.load(imageUrl, () => resize());
  texture.minFilter = THREE.LinearFilter;
  texture.magFilter = THREE.LinearFilter;

  const material = new THREE.ShaderMaterial({
    uniforms: {
      uTexture:  { value: texture },
      uProgress: { value: 0 },
      uHover:    { value: 0 },
      uMouse:    { value: new THREE.Vector2(0.5, 0.5) },
      uTime:     { value: 0 },
      uSeed:     { value: displacementSeed },
    },
    vertexShader: `
      varying vec2 vUv;
      void main() {
        vUv = uv;
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `,
    fragmentShader: `
      precision highp float;
      uniform sampler2D uTexture;
      uniform float uProgress;
      uniform float uHover;
      uniform vec2 uMouse;
      uniform float uTime;
      uniform float uSeed;
      varying vec2 vUv;

      // Inline simplex noise (compact version)
      vec3 permute(vec3 x) { return mod(((x*34.0)+1.0)*x, 289.0); }
      float snoise(vec2 v) {
        const vec4 C = vec4(0.211324865405187, 0.366025403784439, -0.577350269189626, 0.024390243902439);
        vec2 i  = floor(v + dot(v, C.yy));
        vec2 x0 = v - i + dot(i, C.xx);
        vec2 i1 = (x0.x > x0.y) ? vec2(1.0,0.0) : vec2(0.0,1.0);
        vec4 x12 = x0.xyxy + C.xxzz;
        x12.xy -= i1;
        i = mod(i, 289.0);
        vec3 p = permute(permute(i.y + vec3(0.0, i1.y, 1.0)) + i.x + vec3(0.0, i1.x, 1.0));
        vec3 m = max(0.5 - vec3(dot(x0,x0), dot(x12.xy,x12.xy), dot(x12.zw,x12.zw)), 0.0);
        m = m*m; m = m*m;
        vec3 x = 2.0 * fract(p * C.www) - 1.0;
        vec3 h = abs(x) - 0.5;
        vec3 ox = floor(x + 0.5);
        vec3 a0 = x - ox;
        m *= 1.79284291400159 - 0.85373472095314 * (a0*a0 + h*h);
        vec3 g;
        g.x = a0.x * x0.x + h.x * x0.y;
        g.yz = a0.yz * x12.xz + h.yz * x12.yw;
        return 130.0 * dot(m, g);
      }

      void main() {
        vec2 uv = vUv;

        // Procedural displacement — no texture asset needed
        float n = snoise(uv * 4.0 + uSeed + uTime * 0.1);
        vec2 distortion = vec2(n, snoise(uv * 4.0 + uSeed + 5.0 + uTime * 0.1));

        // Distance from mouse for hover falloff
        float d = distance(uv, uMouse);
        float hoverFalloff = smoothstep(0.5, 0.0, d) * uHover;

        float totalProgress = max(uProgress, hoverFalloff);
        vec2 distortedUv = uv + distortion * 0.08 * totalProgress;

        // RGB split for chromatic edge (subtle)
        float r = texture2D(uTexture, distortedUv + vec2(0.006, 0.0) * totalProgress).r;
        float g = texture2D(uTexture, distortedUv).g;
        float b = texture2D(uTexture, distortedUv - vec2(0.006, 0.0) * totalProgress).b;

        gl_FragColor = vec4(r, g, b, 1.0);
      }
    `,
  });

  const plane = new THREE.Mesh(new THREE.PlaneGeometry(2, 2), material);
  scene.add(plane);

  function resize() {
    const { width, height } = wrap.getBoundingClientRect();
    renderer.setSize(width, height);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  }
  resize();
  window.addEventListener('resize', resize);

  // Hover
  wrap.addEventListener('mouseenter', () => {
    gsap.to(material.uniforms.uHover, { value: 1, duration: 1, ease: 'power3.out' });
  });
  wrap.addEventListener('mouseleave', () => {
    gsap.to(material.uniforms.uHover, { value: 0, duration: 1, ease: 'power3.out' });
  });
  wrap.addEventListener('mousemove', (e) => {
    const rect = wrap.getBoundingClientRect();
    const x = (e.clientX - rect.left) / rect.width;
    const y = 1.0 - (e.clientY - rect.top) / rect.height;
    gsap.to(material.uniforms.uMouse.value, { x, y, duration: 0.4, ease: 'power2.out' });
  });

  // Scroll-driven displacement
  gsap.to(material.uniforms.uProgress, {
    value: 0.5,
    scrollTrigger: {
      trigger: wrap,
      start: 'top bottom',
      end: 'bottom top',
      scrub: 1,
    }
  });

  // Render loop
  const clock = new THREE.Clock();
  function render() {
    requestAnimationFrame(render);
    material.uniforms.uTime.value = clock.getElapsedTime();
    renderer.render(scene, camera);
  }
  render();
}

// Initialize — using Unsplash as a free image source (swap to your own)
createDisplacementImage({
  wrap: document.querySelector('#displace-1'),
  imageUrl: 'https://images.unsplash.com/photo-1519681393784-d120267933ba?w=1600&q=80',
  displacementSeed: 1.0,
});
</script>

</body>
</html>
