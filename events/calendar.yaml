# MKUMARAN Trading OS — High-Impact Event Calendar
#
# PURPOSE
#   Options seller and directional strategies consult this file before
#   opening positions. The EventCalendar module loads this at startup
#   and caches it in memory.
#
# MAINTENANCE
#   Update quarterly (Jan / Apr / Jul / Oct) before new expiry cycles
#   begin. Dates closer than 30 days should be verified against official
#   sources:
#     RBI:   https://www.rbi.org.in/Scripts/BS_PressReleaseDisplay.aspx
#     NSE:   https://www.nseindia.com/
#     SEBI:  https://www.sebi.gov.in/
#     US Fed: https://www.federalreserve.gov/monetarypolicy/fomccalendars.htm
#
# ADDING AN EVENT
#   - datetime: ISO 8601 (YYYY-MM-DDTHH:MM:SS+05:30) for IST events,
#               or YYYY-MM-DD (midnight IST assumed for full-day events)
#   - type:     See KNOWN_TYPES in event_calendar.py
#   - buffer_hours: How many hours before/after to blackout trading.
#                   Default if omitted: see DEFAULT_BUFFERS in event_calendar.py
#   - notes:    Human-readable context (optional, not used by code)

events:

  # ── RBI Monetary Policy Committee (2026) ──────────────────────────
  # Source: RBI Press Release FMRD/FMSD/24-25/45 (Dec 2025 schedule)
  - datetime: "2026-02-05T10:00:00+05:30"
    type: rbi_policy
    notes: "RBI MPC Feb 2026 — Rate decision announcement ~10:00 AM IST"

  - datetime: "2026-04-09T10:00:00+05:30"
    type: rbi_policy
    notes: "RBI MPC Apr 2026"

  - datetime: "2026-06-05T10:00:00+05:30"
